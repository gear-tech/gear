[package]
description = "Threshold public-key encryption (Boneh-Franklin IBE) on BLS12-381 for ethexe private transactions"
name = "ethexe-tpke"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
ark-bls12-381 = { workspace = true, features = ["curve"] }
ark-ec = { workspace = true }
ark-ff = { workspace = true }
ark-serialize = { workspace = true }
ark-std = { workspace = true }
blake2 = { workspace = true }
chacha20poly1305 = { workspace = true, features = ["alloc"] }
hkdf = { workspace = true }
parity-scale-codec = { workspace = true, features = ["derive"] }
rand = { workspace = true, features = ["std", "std_rng"] }
scale-info = { workspace = true, features = ["derive"] }
sha2 = { workspace = true }
thiserror = { workspace = true }
zeroize = { workspace = true, features = ["derive"] }
gear-workspace-hack.workspace = true

[dev-dependencies]
hex = { workspace = true, features = ["alloc"] }
hex-literal = { workspace = true }
proptest = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[features]
default = ["std"]
std = [
    "ark-bls12-381/std",
    "ark-ec/std",
    "ark-ff/std",
    "ark-serialize/std",
    "ark-std/std",
    "blake2/std",
    "chacha20poly1305/std",
    "hkdf/std",
    "parity-scale-codec/std",
    "rand/std",
    "scale-info/std",
    "sha2/std",
    "thiserror/std",
    "zeroize/std",
]
