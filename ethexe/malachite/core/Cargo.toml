[package]
name = "ethexe-malachite-core"
description = "Application-agnostic Malachite BFT consensus service used by ethexe-malachite."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
gear-core = { workspace = true, features = ["std"] }
gprimitives = { workspace = true, features = ["std"] }
gsigner = { workspace = true, features = ["std", "secp256k1", "codec", "serde", "keyring"] }
ethexe-common = { workspace = true, features = ["std"] }
gear-workspace-hack.workspace = true

malachitebft-app-channel.workspace = true
malachitebft-app.workspace = true
malachitebft-codec.workspace = true
malachitebft-core-consensus.workspace = true
malachitebft-core-types.workspace = true
malachitebft-engine.workspace = true
malachitebft-signing.workspace = true
malachitebft-signing-ecdsa.workspace = true
malachitebft-sync.workspace = true
malachitebft-test.workspace = true

advisory-lock.workspace = true
anyhow.workspace = true
async-trait.workspace = true
bytes.workspace = true
futures.workspace = true
hex.workspace = true
parity-scale-codec = { workspace = true, features = ["derive", "std"] }
serde = { workspace = true, features = ["derive"] }
sha3 = { workspace = true, features = ["std"] }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "sync", "time"] }
tracing.workspace = true
libp2p-identity.workspace = true
rocksdb.workspace = true
derive_more = { workspace = true, features = ["is_variant"] }

[dev-dependencies]
advisory-lock.workspace = true
proptest.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["test-util"] }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }
