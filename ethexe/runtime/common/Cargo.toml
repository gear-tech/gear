[package]
name = "ethexe-runtime-common"
description = "Shared runtime types and storage traits for ethexe"
documentation = "https://docs.rs/ethexe-runtime-common"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
ethexe-common.workspace = true

gear-lazy-pages-common.workspace = true
core-processor.workspace = true
gear-core.workspace = true
gprimitives.workspace = true
gsys.workspace = true
gear-core-errors.workspace = true
gear-core-backend.workspace = true

anyhow.workspace = true
parity-scale-codec = { workspace = true, features = ["derive"] }
log.workspace = true
derive_more.workspace = true
auto_impl.workspace = true
serde = { workspace = true, features = ["derive"], optional = true }
gear-workspace-hack.workspace = true
delegate.workspace = true
proptest = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
sha3 = { workspace = true, optional = true }
blake2 = { workspace = true, optional = true }
ark-bls12-381 = { workspace = true, optional = true }
ark-ec = { workspace = true, optional = true }
ark-ff = { workspace = true, optional = true }
ark-serialize = { workspace = true, optional = true }

[dev-dependencies]
ark-std = { workspace = true, features = ["std"] }
ethexe-common = { workspace = true, features = ["mock"] }
proptest.workspace = true

[features]
default = ["std"]
std = [
    "anyhow/std",
    "core-processor/std",
    "gear-core/std",
    "gprimitives/serde",
    "log/std",
    "serde/std",
    "ethexe-common/std",
    "dep:sha2",
    "sha2/std",
    "dep:sha3",
    "sha3/std",
    "dep:blake2",
    "blake2/std",
    "dep:ark-bls12-381",
    "ark-bls12-381/std",
    "ark-bls12-381/curve",
    "dep:ark-ec",
    "ark-ec/std",
    "dep:ark-ff",
    "ark-ff/std",
    "dep:ark-serialize",
    "ark-serialize/std",
]
mock = ["std", "dep:proptest", "ethexe-common/mock"]
