[package]
name = "ethexe-rpc-server"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "JSON-RPC server APIs for ethexe"
documentation = "https://docs.rs/ethexe-rpc-server"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["ethexe", "json-rpc", "rpc", "server"]
categories = ["api-bindings", "network-programming", "asynchronous"]

[dependencies]
tokio = { workspace = true, features = ["sync"] }
anyhow.workspace = true
futures.workspace = true
gprimitives = { workspace = true, features = ["serde", "ethexe"] }
ethexe-db.workspace = true
ethexe-processor.workspace = true
ethexe-rpc-common.workspace = true
tower = { workspace = true, features = ["util"] }
tower-http = { workspace = true, features = ["cors"] }
jsonrpsee = { workspace = true, features = ["server", "macros"] }
hyper = { workspace = true, features = ["server"] }
parity-scale-codec.workspace = true
ethexe-common = { workspace = true, features = ["std"] }
ethexe-runtime-common = { workspace = true, features = ["std"] }
sp-core = { workspace = true, features = ["serde"] }
sp-runtime.workspace = true
gear-core = { workspace = true, features = ["std"] }
tracing.workspace = true
dashmap.workspace = true
metrics.workspace = true
metrics-derive.workspace = true
gear-workspace-hack.workspace = true
thiserror.workspace = true
scopeguard.workspace = true
moka = { workspace = true, features = ["sync"] }
binary-merkle-tree.workspace = true

[dev-dependencies]
ethexe-rpc-client.workspace = true
jsonrpsee = { workspace = true, features = ["client"] }
ethexe-common = { workspace = true, features = ["std", "mock"] }
ntest.workspace = true
tracing-subscriber.workspace = true

ethexe-db = {workspace = true, features = ["mock"]}

[lints]
workspace = true
