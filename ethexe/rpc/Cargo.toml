[package]
name = "ethexe-rpc"
description = "JSON-RPC server and client APIs for ethexe"
documentation = "https://docs.rs/ethexe-rpc"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
tokio = { workspace = true, features = ["sync"] }
anyhow.workspace = true
futures.workspace = true
gprimitives = { workspace = true, features = ["serde", "ethexe"] }
ethexe-db.workspace = true
ethexe-processor = { workspace = true, optional = true }
tower = { workspace = true, features = ["util"] }
tower-http = { workspace = true, features = ["cors"] }
jsonrpsee = { workspace = true, features = ["server", "macros"] }
hyper = { workspace = true, features = ["server"] }
parity-scale-codec.workspace = true
ethexe-common = { workspace = true, features = ["std"] }
ethexe-runtime-common = { workspace = true, features = ["std"] }
sp-core = { workspace = true, features = ["serde"] }
gear-core = { workspace = true, features = ["std"] }
serde = { workspace = true, features = ["std"] }
tracing.workspace = true
dashmap.workspace = true
metrics.workspace = true
metrics-derive.workspace = true
gear-workspace-hack.workspace = true
thiserror.workspace = true
scopeguard.workspace = true
moka = {workspace = true, features = ["sync"]}

[dev-dependencies]
jsonrpsee = { workspace = true, features = ["client"] }
ethexe-common = { workspace = true, features = ["std", "mock"] }
ntest.workspace = true
tracing-subscriber.workspace = true

ethexe-db = {workspace = true, features = ["mock"]}

[features]
default = ["server"]
client = ["jsonrpsee/client"]
server = ["dep:ethexe-processor", "jsonrpsee/server", "hyper/server"]
