[package]
name = "ethexe-rpc-client"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "JSON-RPC client APIs for ethexe"
documentation = "https://docs.rs/ethexe-rpc-client"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["ethexe", "json-rpc", "rpc", "client"]
categories = ["api-bindings", "network-programming", "asynchronous"]

[dependencies]
ethexe-common = { workspace = true, features = ["std"] }
ethexe-rpc-common.workspace = true
ethexe-runtime-common = { workspace = true, features = ["std"] }
gprimitives = { workspace = true, features = ["serde", "ethexe"] }
gear-tdec = { workspace = true, features = ["bls12_381"] }
jsonrpsee = { workspace = true, features = ["client", "macros"] }
sp-core = { workspace = true, features = ["serde"] }
gear-workspace-hack.workspace = true

[lints]
workspace = true
