[package]
name = "ethexe-sdk"
description = "Rust SDK for the Vara Ethereum execution layer"
documentation = "https://docs.rs/ethexe-sdk"
categories = ["wasm", "api-bindings"]
keywords = ["gear", "actor-model", "api", "sdk"]
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
ethexe-node-wrapper.workspace = true

alloy.workspace = true
anyhow.workspace = true
ethexe-common.workspace = true
ethexe-compute = { workspace = true, optional = true }
ethexe-db = { workspace = true, optional = true }
ethexe-ethereum.workspace = true
ethexe-malachite = { workspace = true, optional = true }
ethexe-network = { workspace = true, optional = true }
ethexe-rpc = { workspace = true, features = ["client"], default-features = false }
ethexe-processor = { workspace = true, optional = true }
ethexe-prometheus = { workspace = true, optional = true }
ethexe-runtime-common.workspace = true
ethexe-service = { workspace = true, optional = true }
futures.workspace = true
gsigner = { workspace = true, features = ["std", "secp256k1"] }
gprimitives = { workspace = true, features = ["std"] }
jsonrpsee = { workspace = true, features = ["client"] }
gear-workspace-hack.workspace = true

[features]
default = []
operator = [
    "dep:ethexe-compute",
    "dep:ethexe-db",
    "dep:ethexe-malachite",
    "dep:ethexe-network",
    "dep:ethexe-processor",
    "dep:ethexe-prometheus",
    "dep:ethexe-service",
    "gsigner/cli",
    "gsigner/keyring",
    "gsigner/peer-id",
    "gsigner/serde",
]
