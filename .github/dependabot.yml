version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    labels:
      - "type: chore"
      - "ci: macos"
    schedule:
      interval: "weekly"
      day: "sunday"
    commit-message:
      prefix: "chore"
    groups:
      cargo-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    labels:
      - "type: chore"
    schedule:
      interval: "weekly"
      day: "sunday"
    commit-message:
      prefix: "chore"
    groups:
      github-actions:
        patterns:
          - "*"

# TODO:
# After splitting the repository into multiple workspaces,
# assign proper `scope:*` labels per workspace (gear / vara / vara.eth / programs)
# instead of using a global configuration.
