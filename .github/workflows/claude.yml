name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse command
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body || github.event.issue.body || '' }}
        run: |
          # Detect review mode: "@claude review" or "@claude opus review"
          if echo "$COMMENT_BODY" | grep -qiE '@claude\s+(opus\s+)?review'; then
            echo "is_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_review=false" >> "$GITHUB_OUTPUT"
          fi

          # Detect model: "@claude opus ..." switches to opus
          if echo "$COMMENT_BODY" | grep -qi '@claude.*opus'; then
            echo "claude_args=--model opus" >> "$GITHUB_OUTPUT"
          else
            echo "claude_args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code Review
        if: steps.parse.outputs.is_review == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: ${{ steps.parse.outputs.claude_args }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            First, read the file `.gemini/styleguide.md` and follow its review priorities, guidelines, and anti-noise rules strictly.

            Then run: /code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number }} --comment
          additional_permissions: |
            actions: read

      - name: Run Claude Code (General)
        if: steps.parse.outputs.is_review != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: ${{ steps.parse.outputs.claude_args }}
          additional_permissions: |
            actions: read
