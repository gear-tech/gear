[package]
name = "gear-sandbox-interface"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Gear Sandbox Interface"
documentation = "https://docs.rs/gear-sandbox-interface"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["gear", "sandbox", "runtime", "wasm", "no-std"]
categories = ["wasm", "api-bindings", "no-std"]

[lints]
workspace = true

[dependencies]
sp-runtime-interface.workspace = true
sp-wasm-interface.workspace = true
sc-executor = { workspace = true, optional = true }

gear-sandbox-host = { workspace = true, optional = true }
log = { workspace = true, optional = true }

gear-workspace-hack.workspace = true

[features]
default = ["std", "host-api"]
std = [
  "gear-sandbox-host",
  "log",

  "sp-runtime-interface/std",
  "sp-wasm-interface/std",

]
host-api = ["std", "sc-executor", "sp-wasm-interface/wasmtime"]
