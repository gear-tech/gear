[package]
name = "gcli"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Gear program CLI"
documentation = "https://docs.rs/gcli"
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["gear", "vara", "cli", "wasm", "sdk"]
categories = ["command-line-utilities", "api-bindings", "wasm"]

[dependencies]
gsdk.workspace = true
colored.workspace = true
anyhow.workspace = true
derive_more.workspace = true
dirs.workspace = true
tracing-subscriber.workspace = true
gear-core.workspace = true
gsigner = { workspace = true, features = [
    "std",
    "cli",
    "keyring",
    "secp256k1",
    "sr25519",
    "ed25519",
    "codec",
    "serde",
] }
hex.workspace = true
scale-info.workspace = true
serde.workspace = true
clap = { workspace = true, features = ["std", "derive"] }
tokio = { workspace = true, features = ["full"] }
reqwest = { workspace = true, default-features = false, features = [
    "json",
    "rustls-tls",
] }
etc.workspace = true
runtime-primitives.workspace = true
url = { workspace = true, features = ["serde"] }
toml.workspace = true
gear-workspace-hack.workspace = true

[build-dependencies]

[features]
default = ["self-update"]
self-update = []

[dev-dependencies]
snapbox.workspace = true
gear-node-wrapper.workspace = true
indoc.workspace = true

[package.metadata.docs.rs]
all-features = true
