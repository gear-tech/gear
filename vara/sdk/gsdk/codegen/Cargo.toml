[package]
name = "gsdk-codegen"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Code generation library for the Rust SDK of Gear network"
documentation = "https://docs.rs/gsdk-codegen"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["gear", "sdk", "codegen", "proc-macro", "api"]
categories = ["api-bindings", "development-tools::procedural-macro-helpers"]

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true, features = ["default", "full"] }
quote.workspace = true
proc-macro2.workspace = true
gear-workspace-hack.workspace = true
