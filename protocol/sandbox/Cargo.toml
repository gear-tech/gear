[package]
name = "gear-sandbox"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "This crate provides means to instantiate and execute wasm modules."
documentation = "https://docs.rs/gear-sandbox"
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["gear", "sandbox", "wasm", "runtime", "no-std"]
categories = ["wasm", "emulators", "no-std"]

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
parity-scale-codec.workspace = true
log.workspace = true
sp-core.workspace = true
sp-std.workspace = true
sp-wasm-interface-common.workspace = true
gear-sandbox-interface.workspace = true
gear-sandbox-env.workspace = true

# embedded executor only
wasmtime = { features = ["cache", "runtime", "winch"], workspace = true, optional = true }
gear-wasmtime-cache = { workspace = true, optional = true }

gear-workspace-hack.workspace = true

[dev-dependencies]
assert_matches.workspace = true
wat.workspace = true

[features]
default = ["std"]
std = [
	"parity-scale-codec/std",
	"log/std",
	"sp-core/std",
	"sp-std/std",
	"sp-wasm-interface-common/std",
	"gear-sandbox-interface/std",
	"gear-sandbox-env/std",
	"wasmtime",
	"gear-wasmtime-cache",
]
strict = []
