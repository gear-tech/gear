[package]
name = "sp-wasm-interface-common"
version = "7.0.0"
authors.workspace = true
edition = "2021"
rust-version.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
description = "Gear-local compatibility surface for wasm interface helpers."
documentation = "https://docs.rs/sp-wasm-interface-common"
readme = "README.md"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
sp-wasm-interface = { workspace = true, default-features = false }

[features]
default = [ "std" ]
std = [ "sp-wasm-interface/std" ]
