[package]
name = "gear-core-processor"
description = "The core processor for Gear programs"
documentation = "https://docs.rs/core-processor"
keywords = ["gear", "wasm"]
categories = ["wasm"]
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
gear-core.workspace = true
gear-core-errors = { workspace = true, features = ["codec"] }
gear-core-backend.workspace = true
gear-wasm-instrument.workspace = true
gear-lazy-pages-common.workspace = true
gsys.workspace = true
log.workspace = true
derive_more.workspace = true
actor-system-error.workspace = true
parity-scale-codec = { workspace = true, features = ["derive"] }
sp-core = { workspace = true, features = ["full_crypto"] }
# NOTE: sp-io was previously pulled here for secp256k1_ecdsa_recover, but
# on wasm32 targets it registers its own #[global_allocator] which
# conflicts with ethexe-runtime's allocator. Switched to libsecp256k1
# directly (already transitively present via sp-core::ecdsa) so the
# Vara path doesn't drag the sp_io allocator into the ethexe-runtime
# wasm blob.
libsecp256k1 = { workspace = true, features = ["static-context"] }
gear-workspace-hack.workspace = true

[dev-dependencies]
enum-iterator.workspace = true
gear-core = { workspace = true, features = ["mock"] }

[features]
default = ["std"]
std = ["gear-core-backend/std", "gear-wasm-instrument/std", "sp-core/std", "libsecp256k1/std"]
strict = []
mock = ["gear-core/mock"]
gtest = []
