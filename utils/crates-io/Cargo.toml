[package]
name = "crates-io"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Utility for managing Gear packages on crates.io"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["gear", "crates-io", "publishing", "cargo", "ci"]
categories = ["development-tools", "command-line-utilities"]

[dependencies]
anyhow.workspace = true
cargo-http-registry.workspace = true
cargo_metadata.workspace = true
clap = { workspace = true, features = ["derive"] }
gear-workspace-hack.workspace = true
reqwest = { workspace = true, features = ["json", "default-tls"] }
serde = { workspace = true, features = ["derive"] }
tempfile.workspace = true
tokio = { workspace = true, features = ["fs", "macros", "process", "rt-multi-thread", "time"] }
toml_edit.workspace = true
