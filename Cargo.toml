# TODO: remove these dependencies (from this file?) or add more docs.

atomic_enum = "0.3.0"
cfg-if = "1.0.0" # gear-lazy-pages
cargo-http-registry = "0.1.6" # crates-io
core_affinity = "0.8.3" # lazy-pages-fuzzer
env_logger = "0.11.8" # lazy-pages-fuzzer
errno = "0.3" # gear-lazy-pages
nix = "0.26.4" # gear-lazy-pages
ipc-channel = "0.19.0" # lazy-pages-fuzzer
itertools = { version = "0.13", default-features = false } # sdk/wasm-builder
libp2p = "=0.51.4" # vara/sdk/gcli (same version as sc-consensus)
mimalloc = { version = "0.1.46", default-features = false } # vara/node/cli
nacl = "0.5.3" # vara/sdk/gcli
libfuzzer-sys = "0.4" # vara/tools/runtime-fuzzer/fuzz
pathdiff = { version = "0.2.1", default-features = false } # sdk/wasm-builder
rand_chacha = { version = "0.9.0", default-features = false } # lazy-pages-fuzzer
rand_pcg = "0.3.1" # vara/pallets/gear
rustc_version = "0.4.1" # sdk/wasm-builder
schnorrkel = "0.11.4" # vara/sdk/gcli
scopeguard = { version = "1.2.0", default-features = false } # vara/pallets/gear
hyper = "1.4.1" # ethexe/rpc
tabled = "0.10.0" # vara/tools/regression-analysis
thousands = "0.2.0" # vara/tools/regression-analysis
toml = "0.8.14" # sdk/wasm-builder
tower = "0.4.13" # ethexe/rpc
tower-http = "0.5.2" # ethexe/rpc
tracing-appender = "0.2" # vara/tools/node-loader
trybuild = "1" # sdk/gstd/codegen
wasmprinter = "0.230" # protocol/wasm-gen
fail = "0.5" # gear-common
heck = "0.5.0" # gsdk-api-gen
etc = "0.1.19" # vara/sdk/gcli
toml_edit = "0.22.12" # crates-io
directories = "5.0.1" # vara/tools/key-finder
num-traits = { version = "0.2", default-features = false } # gear-core
glob = "0.3.1" # cargo-gbuild
smallvec = "1.13.2" # vara/sdk/node-wrapper
bytes = "1.8.0" # ethexe/malachite/core
wasm-smith = { version = "0.230", features = ["wasmparser"] } # protocol/wasm-gen
wasm-encoder = { version = "0.230", default-features = false, features = [
    "wasmparser",
] } # protocol/wasm-instrument
async-broadcast = "0.7.2" # ethexe/service
ip_network = "0.4.1" # ethexe/network

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(fuzz)',
    'cfg(substrate_runtime)',
] }

[workspace.metadata.cargo-shear]
ignored = [
    "gear-workspace-hack",
    "frame-benchmarking",
    "frame-system-benchmarking",
    "frame-system-rpc-runtime-api",
    "vara-runtime",
    "scale-decode",
    "scale-info",
    "parity-scale-codec",
    "pallet-authorship",
    "pallet-timestamp",
    "sp-application-crypto",
    "ethexe-sdk",
]

[profile.release]
panic = "unwind"

[profile.release.package.gcore]
opt-level = "s"

[profile.release.package.gstd]
opt-level = "s"

[profile.release.package.galloc]
opt-level = "s"

[profile.release.package.gtest]
opt-level = "s"

[profile.production]
inherits = "release"
strip = true

# Sacrifice compile speed for execution speed by using optimization flags:

# https://doc.rust-lang.org/rustc/linker-plugin-lto.html
lto = "fat"
# https://doc.rust-lang.org/rustc/codegen-options/index.html#codegen-units
codegen-units = 1

[profile.profiling]
inherits = "release"
debug = true

[patch.crates-io]
gear-workspace-hack = { path = "utils/gear-workspace-hack" }
# core2 0.4.0 was yanked on crates.io; pin upstream git so cargo metadata doesn't fail on yanked lookup.
# Needed by cid -> sc-network transitive; triggers during wasm-builder sub-project resolve.
core2 = { git = "https://github.com/bbqsrc/core2", rev = "545e84bcb0f235b12e21351e0c69767958efe2a7" }

# these patched dependecies force their `sign_ext` feature to be used by Substrate dependencies
parity-wasm = { version = "0.45.0", git = "https://github.com/gear-tech/parity-wasm", branch = "v0.45.0-sign-ext" }
wasmi-validation = { version = "0.5.0", git = "https://github.com/gear-tech/wasmi", branch = "v0.13.2-sign-ext" }
wasm-instrument = { version = "0.4.0", git = "https://github.com/gear-tech/wasm-instrument", branch = "v0.4.0-sign-ext" }

# there are patches to disable `memory.grow` and to add offset of reserved memory
wasm-smith = { version = "0.230", git = "https://github.com/gear-tech/wasm-tools", branch = "gear-stable-1.230" }
