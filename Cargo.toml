[workspace.package]
version = "1.10.0"
authors = ["Gear Technologies"]
edition = "2024"
license = "GPL-3.0"
homepage = "https://gear-tech.io"
repository = "https://github.com/gear-tech/gear"
rust-version = "1.91"

[workspace]
resolver = "3"

default-members = ["vara/node/cli"]

exclude = ["ethexe/contracts", "ethexe/docker", "ethexe/malachite", "ethexe/scripts"]

members = [
  # protocol
  "protocol/*",
  "protocol/lazy-pages",
  "protocol/lazy-pages/common",
  "protocol/lazy-pages/fuzzer",
  "protocol/lazy-pages/fuzzer/runner",
  "protocol/lazy-pages/interface",
  "protocol/lazy-pages/native-interface",
  "protocol/sandbox",
  "protocol/sandbox/env",
  "protocol/sandbox/host",
  # vara
  "vara/common",
  "vara/common/codegen",
  "vara/sdk/builtins/*",
  "vara/sdk/gcli",
  "vara/sdk/gsdk",
  "vara/sdk/node-wrapper",
  "vara/node/authorship",
  "vara/node/cli",
  "vara/node/service",
  "vara/node/testing",
  "vara/pallets/*",
  "vara/runtime/*",
  "vara/runtime/interface/sandbox",
  "vara/tools/*",
  "vara/tools/runtime-fuzzer/fuzz",
  "vara/tools/regression-analysis/junit-common",
  # ethexe
  "ethexe/*",
  "ethexe/malachite/core",
  "ethexe/malachite/service",
  "ethexe/runtime/common",
  "ethexe/service/utils",
  # sdk
  "sdk/cargo-gbuild",
  "sdk/galloc",
  "sdk/gcore",
  "sdk/gstd",
  "sdk/gstd/codegen",
  "sdk/gsys",
  "sdk/gtest",
  "sdk/stack-buffer",
  "sdk/wasm-builder",
  "sdk/wasm-optimizer",
  "sdk/wasm-proc",
  # sdk/examples
  "sdk/examples/async",
  "sdk/examples/async-critical",
  "sdk/examples/async-custom-entry",
  "sdk/examples/async-init",
  "sdk/examples/async-reply-hook",
  "sdk/examples/async-signal-entry",
  "sdk/examples/async-tester",
  "sdk/examples/autoreply",
  "sdk/examples/big-data-section",
  "sdk/examples/bls381",
  "sdk/examples/calc-hash",
  "sdk/examples/custom",
  "sdk/examples/delayed-reservation-sender",
  "sdk/examples/compose",
  "sdk/examples/constructor",
  "sdk/examples/create-program-reentrance",
  "sdk/examples/ctor",
  "sdk/examples/delayed-sender",
  "sdk/examples/distributor",
  "sdk/examples/fungible-token",
  "sdk/examples/stack-allocations",
  "sdk/examples/futures-unordered",
  "sdk/examples/gas-burned",
  "sdk/examples/incomplete-async-payloads",
  "sdk/examples/inheritor-in-error-reply",
  "sdk/examples/init-fail-sender",
  "sdk/examples/init-wait",
  "sdk/examples/init-wait-reply-exit",
  "sdk/examples/messenger",
  "sdk/examples/mul-by-const",
  "sdk/examples/ncompose",
  "sdk/examples/node",
  "sdk/examples/out-of-memory",
  "sdk/examples/panic-payload",
  "sdk/examples/piggy-bank",
  "sdk/examples/ping",
  "sdk/examples/program-factory",
  "sdk/examples/program-generator",
  "sdk/examples/proxy",
  "sdk/examples/proxy-broker",
  "sdk/examples/proxy-relay",
  "sdk/examples/proxy-reservation-with-gas",
  "sdk/examples/read-big-state",
  "sdk/examples/reservation-manager",
  "sdk/examples/reserve-gas",
  "sdk/examples/rwlock",
  "sdk/examples/send-from-reservation",
  "sdk/examples/signal-entry",
  "sdk/examples/state-rollback",
  "sdk/examples/sync-duplicate",
  "sdk/examples/syscalls",
  "sdk/examples/syscall-error",
  "sdk/examples/value-sender",
  "sdk/examples/vec",
  "sdk/examples/wait",
  "sdk/examples/wait-timeout",
  "sdk/examples/wait_wake",
  "sdk/examples/waiter",
  "sdk/examples/waiting-proxy",
  "sdk/examples/wat",
  # utils
  "utils/*",
]

[workspace.dependencies]
gear-workspace-hack = "0.1.0"

alloy = "2.0"
alloy-chains = "0.2.33"
alloy-primitives = { version = "1.5.7", default-features = false }
alloy-sol-types = { version = "1.5.7", default-features = false }
