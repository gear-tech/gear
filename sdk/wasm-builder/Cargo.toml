[package]
name = "gear-wasm-builder"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Utility for building Gear programs"
documentation = "https://docs.rs/gear-wasm-builder"
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["gear", "wasm", "builder", "smart-contracts", "cargo"]
categories = ["wasm", "development-tools::build-utils"]
include = ["build.rs", "src/**/*", "Cargo.toml", "README.md"]

[dependencies]
anyhow.workspace = true
cargo_metadata.workspace = true
cargo_toml.workspace = true
chrono = "0.4"
thiserror.workspace = true
regex.workspace = true
toml.workspace = true
log.workspace = true
pathdiff.workspace = true
gear-core.workspace = true
gear-wasm-instrument.workspace = true
gear-wasm-optimizer.workspace = true
itertools = { workspace = true, features = ["use_std"] }
gear-workspace-hack.workspace = true

[features]
## Disables unsupported syscalls and their calls for executing on ethexe.
ethexe = []
