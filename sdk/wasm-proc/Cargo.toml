[package]
name = "wasm-proc"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Gear wasm processor"
documentation = "https://docs.rs/wasm-proc"
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["gear", "cli", "wasm", "processor", "optimizer"]
categories = ["command-line-utilities", "wasm", "development-tools::build-utils"]

[dependencies]
clap = { workspace = true, features = ["derive"] }
log.workspace = true
tracing-subscriber.workspace = true
gear-wasm-builder.workspace = true
gear-wasm-instrument = { workspace = true, features = ["std"] }
gear-workspace-hack.workspace = true
wasmparser.workspace = true
