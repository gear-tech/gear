[package]
name = "gbuild-test-program"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
gstd = { path = "../../gstd" }

[dev-dependencies]
gtest = { path = "../../gtest" }

[features]
debug = ["gstd/debug"]
default = []
std = []

[workspace]
members = ["foo", "bar"]

[workspace.metadata.gbuild]
programs = ["foo", "bar"]

# `time 0.3.48` breaks `tracing-subscriber` compilation with a false-positive
# E0119 (time-rs/time#783); pin the last good release — the patch shadows the
# whole semver-compatible 0.3.x range on crates.io.
# TODO: drop this patch once a fixed time (> 0.3.48, time-rs/time#784) ships.
[patch.crates-io]
time = { git = "https://github.com/time-rs/time.git", tag = "v0.3.47" }

[patch."https://github.com/paritytech/polkadot-sdk.git"]
sp-runtime-interface-proc-macro = { path = "../../../substrate/sp-runtime-interface-proc-macro" }
sp-wasm-interface = { path = "../../../substrate/sp-wasm-interface" }
