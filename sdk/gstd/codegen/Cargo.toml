[package]
name = "gstd-codegen"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Code generation library for the Gear standard library"
documentation = "https://docs.rs/gstd-codegen"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["gear", "gstd", "codegen", "proc-macro", "wasm"]
categories = ["development-tools::procedural-macro-helpers", "wasm"]

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true, features = ["default", "full"] }
quote.workspace = true
proc-macro2.workspace = true
gprimitives.workspace = true
gear-workspace-hack.workspace = true

[dev-dependencies]
gstd.path = ".."
trybuild.workspace = true

[features]
ethexe = [
    "gprimitives/ethexe",
    "gstd/ethexe"
]
